version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# CelebStyle — Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    <<: [*restart, *logging]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-celebstyle}
      POSTGRES_USER:     ${POSTGRES_USER:-celebstyle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-celebstyle} -d ${POSTGRES_DB:-celebstyle}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s
    networks: [internal]

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    <<: [*restart, *logging]
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory   ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5
    networks: [internal]

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    <<: [*restart, *logging]
    build:
      context:    ./apps/backend
      dockerfile: Dockerfile
      target:     runner
    env_file: .env.production
    environment:
      NODE_ENV:     production
      PORT:         "4000"
      TRUST_PROXY:  "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s
    networks: [internal]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    <<: [*restart, *logging]
    build:
      context:    ./apps/frontend
      dockerfile: Dockerfile
      target:     runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s
    networks: [internal]

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    <<: [*restart, *logging]
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
    networks: [internal, external]

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    <<: [*restart, *logging]
    image: prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [internal]

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    <<: [*restart, *logging]
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "${GRAFANA_ROOT_URL:-http://localhost:3001}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
