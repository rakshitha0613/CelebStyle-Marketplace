<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 418" width="380" height="760">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9ecd4"/>
      <stop offset="100%" stop-color="#F2D9A8"/>
    </linearGradient>
    <linearGradient id="skirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e4c2"/>
      <stop offset="100%" stop-color="#d9c282"/>
    </linearGradient>
  </defs>
  <!-- Dress bodice (sleeveless) -->
  <path fill="url(#fg)" stroke="#b6a37e" stroke-width="1.5" stroke-linejoin="round"
    d="M 84,46 C 96,20 140,10 190,10 C 240,10 284,20 296,46
       L 296,46 C 270,38 252,36 248,38 L 240,58
       C 228,54 214,52 190,52 C 166,52 152,54 140,58
       L 132,38 C 128,36 110,38 84,46 Z"/>
  <!-- Dress bodice main body -->
  <path fill="url(#fg)" stroke="#b6a37e" stroke-width="1.5"
    d="M 132,38 L 140,58 C 120,70 110,90 108,110
       L 108,290 C 108,302 116,310 130,312
       L 250,312 C 264,310 272,302 272,290
       L 272,110 C 270,90 260,70 240,58
       L 248,38 C 264,46 272,56 280,70"/>
  <!-- Connect bodice sides -->
  <line x1="84" y1="46" x2="108" y2="110" stroke="#b6a37e" stroke-width="1.5"/>
  <line x1="296" y1="46" x2="272" y2="110" stroke="#b6a37e" stroke-width="1.5"/>
  <!-- Waist seam -->
  <line x1="108" y1="290" x2="272" y2="290" stroke="#b6a37e" stroke-width="1.5"/>
  <!-- Skirt (A-line, flared) -->
  <path fill="url(#skirt)" stroke="#b6a37e" stroke-width="1.5"
    d="M 108,290 L 130,312 L 250,312 L 272,290
       L 316,740 L 64,740 Z"/>
  <!-- Skirt fabric lines -->
  <line x1="120" y1="320" x2="72" y2="730" stroke="#D4D4D4" stroke-width="0.8"/>
  <line x1="160" y1="320" x2="130" y2="730" stroke="#D4D4D4" stroke-width="0.8"/>
  <line x1="190" y1="320" x2="190" y2="730" stroke="#D4D4D4" stroke-width="0.8"/>
  <line x1="220" y1="320" x2="250" y2="730" stroke="#D4D4D4" stroke-width="0.8"/>
  <line x1="260" y1="320" x2="308" y2="730" stroke="#D4D4D4" stroke-width="0.8"/>
  <!-- Hem line -->
  <line x1="64" y1="732" x2="316" y2="732" stroke="#b6a37e" stroke-width="1.2" stroke-dasharray="6,4"/>
  <!-- Neckline -->
  <path fill="none" stroke="#9d8d6d" stroke-width="1.2"
    d="M 132,38 C 145,55 160,64 190,64 C 220,64 235,55 248,38"/>
  <!-- Center back seam -->
  <line x1="190" y1="64" x2="190" y2="290" stroke="#f4dfb5" stroke-width="0.8" stroke-dasharray="5,4"/>
  <!-- Bodice waist detail -->
  <path fill="none" stroke="#b6a37e" stroke-width="1"
    d="M 126,280 C 150,296 230,296 254,280"/>
</svg>
