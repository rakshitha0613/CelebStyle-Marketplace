<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500" width="200" height="200">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4d4be"/>
      <stop offset="100%" stop-color="#C9A87C"/>
    </linearGradient>
    <linearGradient id="lapel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9c2a3"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
  </defs>
  <!-- Jacket body -->
  <path fill="url(#fg)" stroke="#836d51" stroke-width="1.5" stroke-linejoin="round"
    d="M 63,35 C 80,15 145,6 210,6 C 275,6 340,15 357,35
       L 408,78 L 408,360 L 364,360 L 360,110 L 318,104
       L 316,390 L 104,390 L 102,104 L 60,110 L 56,360 L 12,360 L 12,78 Z"/>
  <!-- Left lapel -->
  <path fill="url(#lapel)" stroke="#836d51" stroke-width="1.5" stroke-linejoin="round"
    d="M 210,6 C 200,6 155,14 138,28 L 158,80 L 200,55 L 210,6 Z"/>
  <!-- Right lapel -->
  <path fill="url(#lapel)" stroke="#836d51" stroke-width="1.5" stroke-linejoin="round"
    d="M 210,6 C 220,6 265,14 282,28 L 262,80 L 220,55 L 210,6 Z"/>
  <!-- Lapel notch lines -->
  <line x1="138" y1="28" x2="158" y2="80" stroke="#836d51" stroke-width="1.5"/>
  <line x1="282" y1="28" x2="262" y2="80" stroke="#836d51" stroke-width="1.5"/>
  <!-- Center front opening -->
  <line x1="200" y1="55" x2="198" y2="390" stroke="#977e5d" stroke-width="1.5"/>
  <line x1="220" y1="55" x2="222" y2="390" stroke="#977e5d" stroke-width="1.5"/>
  <!-- Zip pull or buttons -->
  <circle cx="210" cy="120" r="5" fill="#fafafa" stroke="#836d51" stroke-width="1.2"/>
  <circle cx="210" cy="150" r="5" fill="#fafafa" stroke="#836d51" stroke-width="1.2"/>
  <circle cx="210" cy="180" r="5" fill="#fafafa" stroke="#836d51" stroke-width="1.2"/>
  <!-- Chest pockets -->
  <rect x="130" y="135" width="52" height="36" rx="3" fill="none" stroke="#977e5d" stroke-width="1.2"/>
  <rect x="238" y="135" width="52" height="36" rx="3" fill="none" stroke="#977e5d" stroke-width="1.2"/>
  <!-- Lower pockets -->
  <rect x="114" y="250" width="68" height="46" rx="4" fill="none" stroke="#977e5d" stroke-width="1.2"/>
  <rect x="238" y="250" width="68" height="46" rx="4" fill="none" stroke="#977e5d" stroke-width="1.2"/>
  <!-- Shoulder seams -->
  <line x1="102" y1="104" x2="63" y2="35" stroke="#977e5d" stroke-width="1"/>
  <line x1="318" y1="104" x2="357" y2="35" stroke="#977e5d" stroke-width="1"/>
  <!-- Hem stitch -->
  <line x1="104" y1="382" x2="316" y2="382" stroke="#977e5d" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Sleeve cuffs -->
  <rect x="12" y="316" width="48" height="44" rx="3" fill="#d9c2a3" stroke="#836d51" stroke-width="1.5"/>
  <rect x="360" y="316" width="48" height="44" rx="3" fill="#d9c2a3" stroke="#836d51" stroke-width="1.5"/>
</svg>
