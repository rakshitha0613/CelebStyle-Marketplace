<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 900" width="420" height="900">
  <defs>
    <linearGradient id="sareeBody" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="40%" stop-color="#A52A2A"/>
      <stop offset="100%" stop-color="#800000"/>
    </linearGradient>
    <linearGradient id="sareeBlouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="sareeBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <pattern id="zariborder" x="0" y="0" width="30" height="14" patternUnits="userSpaceOnUse">
      <path d="M0,7 Q7.5,0 15,7 Q22.5,14 30,7" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.8"/>
      <circle cx="15" cy="7" r="2" fill="#FFD700" opacity="0.6"/>
    </pattern>
    <pattern id="zaribody" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M20,0 L40,20 L20,40 L0,20 Z" fill="none" stroke="#D4A017" stroke-width="0.6" opacity="0.2"/>
      <circle cx="20" cy="20" r="1.5" fill="#D4A017" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Saree blouse (choli) - short fitted top with sleeves -->
  <path fill="url(#sareeBlouse)" stroke="#B8860B" stroke-width="1.5" stroke-linejoin="round"
    d="M 92,45 C 102,20 148,10 210,10 C 272,10 318,20 328,45
       L 380,80 L 380,200 L 340,200 L 336,100 L 296,94
       L 296,240 L 124,240 L 124,94 L 84,100 L 80,200 L 40,200 L 40,80 Z"/>
  <!-- Blouse neckline curve -->
  <path fill="none" stroke="#D4A017" stroke-width="2"
    d="M 148,30 C 162,50 175,60 210,60 C 245,60 258,50 272,30"/>
  <!-- Blouse embroidery border -->
  <path fill="none" stroke="#D4A017" stroke-width="1.5" opacity="0.7"
    d="M 148,32 C 162,52 175,62 210,62 C 245,62 258,52 272,32"/>
  <!-- Saree drape (main body/skirt) -->
  <path fill="url(#sareeBody)" stroke="#800000" stroke-width="1.5"
    d="M 80,240 L 60,860 L 360,860 L 340,240 Z"/>
  <!-- Zari pattern body overlay -->
  <path fill="url(#zaribody)" stroke="none"
    d="M 80,240 L 60,860 L 360,860 L 340,240 Z" opacity="0.4"/>
  <!-- Drape pleats/folds -->
  <line x1="140" y1="250" x2="120" y2="850" stroke="#6B0000" stroke-width="1" opacity="0.5"/>
  <line x1="175" y1="250" x2="170" y2="850" stroke="#6B0000" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="250" x2="210" y2="850" stroke="#6B0000" stroke-width="1" opacity="0.5"/>
  <line x1="245" y1="250" x2="250" y2="850" stroke="#6B0000" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="250" x2="300" y2="850" stroke="#6B0000" stroke-width="1" opacity="0.5"/>
  <!-- Gold border at skirt hem -->
  <rect x="60" y="840" width="300" height="20" fill="url(#sareeBorder)" rx="2"/>
  <rect x="60" y="840" width="300" height="20" fill="url(#zariborder)" opacity="0.8"/>
  <!-- Gold border at skirt left edge -->
  <rect x="60" y="240" width="12" height="620" fill="url(#sareeBorder)" rx="1"/>
  <!-- Gold border at skirt right edge -->
  <rect x="348" y="240" width="12" height="620" fill="url(#sareeBorder)" rx="1"/>
  <!-- Pallu (draped end over shoulder) -->
  <path fill="#9B0000" stroke="#800000" stroke-width="1.5" stroke-linejoin="round"
    d="M 296,94 L 370,55 L 410,130 L 410,470 L 360,470 L 336,240 L 296,240 Z"/>
  <!-- Pallu zari pattern -->
  <path fill="url(#zaribody)" stroke="none"
    d="M 296,94 L 370,55 L 410,130 L 410,470 L 360,470 L 336,240 L 296,240 Z" opacity="0.3"/>
  <!-- Pallu gold border -->
  <path fill="url(#sareeBorder)" stroke="none"
    d="M 370,55 L 410,130 L 410,145 L 370,70 Z" opacity="0.8"/>
  <rect x="390" y="130" width="20" height="340" fill="url(#sareeBorder)" rx="1" opacity="0.8"/>
  <!-- Pallu hem gold border -->
  <rect x="360" y="450" width="50" height="20" fill="url(#sareeBorder)" rx="2" opacity="0.8"/>
  <!-- Blouse side seams -->
  <line x1="124" y1="94" x2="92" y2="45" stroke="#B8860B" stroke-width="1.2"/>
  <line x1="296" y1="94" x2="328" y2="45" stroke="#B8860B" stroke-width="1.2"/>
  <!-- Sleeve cuffs with gold trim -->
  <rect x="40" y="160" width="44" height="40" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="40" y="160" width="44" height="6" rx="2" fill="#FFD700" opacity="0.8"/>
  <rect x="336" y="160" width="44" height="40" rx="3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="336" y="160" width="44" height="6" rx="2" fill="#FFD700" opacity="0.8"/>
  <!-- Blouse waistband gold trim -->
  <path fill="url(#sareeBorder)" stroke="none"
    d="M 124,230 Q 170,242 210,244 Q 250,242 296,230 L 296,240 Q 250,252 210,254 Q 170,252 124,240 Z"/>
</svg>
