<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" width="420" height="520">
  <defs>
    <linearGradient id="suitJacket" x1="0" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="suitTrouser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2840"/>
      <stop offset="100%" stop-color="#0F1E33"/>
    </linearGradient>
    <linearGradient id="suitLapel" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#243548"/>
    </linearGradient>
    <linearGradient id="suitWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>
  <!-- Trouser (visible below jacket) -->
  <path fill="url(#suitTrouser)" stroke="#0A1520" stroke-width="1.2"
    d="M 134,360 L 128,515 L 202,515 L 210,400 L 218,515 L 292,515 L 286,360 Z"/>
  <!-- Trouser crease lines -->
  <line x1="166" y1="365" x2="164" y2="510" stroke="#243548" stroke-width="1" opacity="0.6"/>
  <line x1="254" y1="365" x2="256" y2="510" stroke="#243548" stroke-width="1" opacity="0.6"/>
  <!-- Belt line -->
  <rect x="134" y="350" width="152" height="16" rx="2" fill="#0A1520" stroke="#1C2B3A" stroke-width="1"/>
  <!-- Belt buckle - gold -->
  <rect x="197" y="352" rx="2" ry="2" width="26" height="12" fill="#D4A017" stroke="#B8860B" stroke-width="1.2"/>
  <!-- Suit jacket body -->
  <path fill="url(#suitJacket)" stroke="#0A1520" stroke-width="1.5" stroke-linejoin="round"
    d="M 59,31 C 76,12 140,4 210,4 C 280,4 344,12 361,31
       L 408,77 L 408,300 L 365,300 L 362,106 L 320,98
       L 318,370 L 102,370 L 100,98 L 58,106 L 55,300 L 12,300 L 12,77 Z"/>
  <!-- Left lapel - navy slightly lighter -->
  <path fill="url(#suitLapel)" stroke="#0A1520" stroke-width="1.5" stroke-linejoin="round"
    d="M 210,4 C 195,4 155,14 135,28 L 152,74 L 170,112 L 200,58 Z"/>
  <!-- Right lapel -->
  <path fill="url(#suitLapel)" stroke="#0A1520" stroke-width="1.5" stroke-linejoin="round"
    d="M 210,4 C 225,4 265,14 285,28 L 268,74 L 250,112 L 220,58 Z"/>
  <!-- White shirt visible between lapels -->
  <path fill="url(#suitWhite)" stroke="#E0E0E0" stroke-width="1"
    d="M 200,58 L 170,112 L 175,370 L 210,370 L 245,370 L 250,112 L 220,58 Z"/>
  <!-- White shirt collar points -->
  <path fill="url(#suitWhite)" stroke="#D0D0D0" stroke-width="1"
    d="M 170,112 L 182,82 L 200,100 Z"/>
  <path fill="url(#suitWhite)" stroke="#D0D0D0" stroke-width="1"
    d="M 250,112 L 238,82 L 220,100 Z"/>
  <!-- Center shirt buttons -->
  <circle cx="210" cy="130" r="3" fill="#E0E0E0" stroke="#C0C0C0" stroke-width="0.8"/>
  <circle cx="210" cy="150" r="3" fill="#E0E0E0" stroke="#C0C0C0" stroke-width="0.8"/>
  <!-- Gold lapel pin -->
  <circle cx="155" cy="130" r="4" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <!-- Lapel notch lines -->
  <line x1="135" y1="28" x2="152" y2="74" stroke="#0A1520" stroke-width="1.5"/>
  <line x1="285" y1="28" x2="268" y2="74" stroke="#0A1520" stroke-width="1.5"/>
  <!-- Jacket buttons - gold -->
  <circle cx="196" cy="185" r="6" fill="#D4A017" stroke="#B8860B" stroke-width="1.2"/>
  <circle cx="196" cy="228" r="6" fill="#D4A017" stroke="#B8860B" stroke-width="1.2"/>
  <!-- Breast pocket -->
  <rect x="136" y="138" width="56" height="9" rx="2" fill="none" stroke="#243548" stroke-width="1.5"/>
  <!-- White pocket square -->
  <path fill="white" stroke="#D0D0D0" stroke-width="0.8"
    d="M 148,134 L 152,128 L 158,132 L 156,138 L 148,138 Z"/>
  <!-- Lower flap pockets -->
  <path fill="#1C2B3A" stroke="#243548" stroke-width="1.2"
    d="M 110,270 L 110,284 L 180,284 L 180,270 L 176,262 L 114,262 Z"/>
  <path fill="#1C2B3A" stroke="#243548" stroke-width="1.2"
    d="M 240,270 L 240,284 L 310,284 L 310,270 L 306,262 L 244,262 Z"/>
  <!-- Shoulder seams -->
  <line x1="100" y1="98" x2="59"  y2="31" stroke="#243548" stroke-width="1.2"/>
  <line x1="320" y1="98" x2="361" y2="31" stroke="#243548" stroke-width="1.2"/>
  <!-- Hem stitch -->
  <line x1="102" y1="362" x2="318" y2="362" stroke="#243548" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Sleeve cuffs -->
  <rect x="12"  y="256" width="47" height="44" rx="3" fill="#1C2B3A" stroke="#243548" stroke-width="1.5"/>
  <rect x="361" y="256" width="47" height="44" rx="3" fill="#1C2B3A" stroke="#243548" stroke-width="1.5"/>
  <!-- White cuff showing from sleeve -->
  <rect x="12"  y="256" width="47" height="8" rx="2" fill="white" opacity="0.9"/>
  <rect x="361" y="256" width="47" height="8" rx="2" fill="white" opacity="0.9"/>
  <!-- Cuff buttons - gold -->
  <circle cx="32"  cy="278" r="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <circle cx="32"  cy="291" r="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <circle cx="389" cy="278" r="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
  <circle cx="389" cy="291" r="3" fill="#D4A017" stroke="#B8860B" stroke-width="1"/>
</svg>
