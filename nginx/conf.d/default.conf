upstream backend {
  server backend:4000;
  keepalive 32;
}

upstream frontend {
  server frontend:3000;
  keepalive 16;
}

# ── HTTP → HTTPS redirect (production) ───────────────────────────────────────
server {
  listen 80;
  server_name _;

  # Health check for load balancers — always respond with 200
  location = /nginx-health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }

  # In production, redirect to HTTPS; in dev mode, proxy directly
  location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # ── API proxy ────────────────────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;

    # Never expose backend errors verbatim
    proxy_intercept_errors off;
  }

  # ── Auth — tighter rate limit ────────────────────────────────────────────────
  location /api/auth/ {
    limit_req zone=auth burst=5 nodelay;

    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
  }

  # ── Health (no rate limit) ───────────────────────────────────────────────────
  location /api/health {
    proxy_pass       http://backend;
    proxy_set_header Host $host;
    access_log off;
  }

  # ── Block /metrics externally ─────────────────────────────────────────────────
  location /metrics {
    deny all;
    return 403;
  }
}
