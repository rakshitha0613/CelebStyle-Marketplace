global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    service: celebstyle
    env:     production

rule_files: []

alerting:
  alertmanagers: []

scrape_configs:

  - job_name: celebstyle-backend
    static_configs:
      - targets: ["backend:4000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout:  10s

  - job_name: nginx
    static_configs:
      - targets: ["nginx:9113"]
    scrape_interval: 30s

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
